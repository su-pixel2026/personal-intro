    //第五部分：异步
    // ===== 1. setTimeout：延迟执行 =====
    console.log('1. 开始');
    setTimeout(() => {
      console.log('2. 3 秒后才出现');
    }, 3000);
    console.log('3. 结束');

    // 注意 Console 输出顺序：1 → 3 → 2
    // JS 不会傻等 3 秒，它先把后面的事做了，3 秒后再回来处理

    // ===== 2. Promise：未来的结果 =====
    let myPromise = new Promise((resolve, reject) => {
      let success = true;  // 试试改成 false 看变化
      setTimeout(() => {
        if (success) {
          resolve('数据拿到了！');
        } else {
          reject('网络错误');
        }
      }, 2000);
    });

    myPromise
      .then(data => console.log('成功:', data))
      .catch(err => console.log('失败:', err));

    // ===== 3. async/await：Promise 的简洁写法 =====
    async function fetchData() {
      console.log('开始请求...');
      try {
        let data = await myPromise;  // await = 等 Promise 出结果再往下走
        console.log('await 拿到:', data);
      } catch (err) {
        console.log('await 失败:', err);
      }
    }
    fetchData();

    // ===== 4. fetch：真正从网上拿数据 =====
    async function getQuote() {
      try {
        let response = await fetch('https://api.quotable.io/random');
        let data = await response.json();
        console.log(data);
        console.log('名言:', data.content);
        console.log('作者:', data.length);
      } catch (err) {
        console.log('请求失败:', err);
      }
    }
    getQuote();
